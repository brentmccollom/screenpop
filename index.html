<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tigerpaw Screen Pop Redirector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 400px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        .debug-box {
            margin-top: 15px;
            padding: 10px;
            background: #eee;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Processing Tigerpaw Screen Pop...</h2>
    <div id="status-icon" class="loader"></div>
    <p id="status-text">Sending phone number to Tigerpaw Desktop client.</p>
    <div id="debug" class="debug-box">Detecting URL parameters...</div>
</div>

<script>
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    window.onload = function() {
        const phone = getQueryParam('phone');
        const debugDiv = document.getElementById('debug');
        const statusText = document.getElementById('status-text');
        const statusIcon = document.getElementById('status-icon');
        
        if (phone) {
            debugDiv.innerText = "Received Raw Data: " + phone;
            
            // Clean the phone number string
            const cleanPhone = phone.replace(/[^0-9%]/g, '');
            
            // CRITICAL CHECK: If it contains a placeholder % or is missing real numbers, halt and show error
            if (cleanPhone.includes('%') || cleanPhone.length < 7) {
                statusIcon.style.animation = "none";
                statusIcon.style.borderColor = "#e74c3c";
                statusText.innerText = "Error: Phone system passed a variable placeholder token instead of real digits.";
                debugDiv.innerHTML = "<strong>Fix Required:</strong> Check your Intermedia URL settings. It passed: <code>" + phone + "</code>";
                return;
            }
            
            // Fire the custom windows protocol handler cleanly
            window.location.href = 'intermediapop://' + cleanPhone;
            
            setTimeout(function() {
                window.close();
            }, 2500);
        } else {
            statusIcon.style.animation = "none";
            statusText.innerText = "Error: No phone number detected in the URL query string.";
            debugDiv.innerText = "Expected URL format: ?phone=8124245288";
        }
    };
</script>

</body>
</html>
